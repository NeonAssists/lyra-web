<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1024" height="1024" fill="#0A0A0F"/>
  
  <!-- Stylized Lyre - minimal geometric lines -->
  <g transform="translate(512, 512)">
    <!-- Left arm of lyre -->
    <path d="M -120 -180 Q -160 -100 -140 0 Q -130 80 -90 140" 
          stroke="#6C63FF" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Right arm of lyre -->
    <path d="M 120 -180 Q 160 -100 140 0 Q 130 80 90 140" 
          stroke="#6C63FF" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Top bridge -->
    <line x1="-110" y1="-180" x2="110" y2="-180" stroke="#6C63FF" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Bottom bridge -->
    <line x1="-85" y1="150" x2="85" y2="150" stroke="#6C63FF" stroke-width="12" stroke-linecap="round"/>
    
    <!-- Strings (7 strings) - thinner, accent color -->
    <line x1="-70" y1="-170" x2="-70" y2="140" stroke="#6C63FF" stroke-width="6" opacity="0.7" stroke-linecap="round"/>
    <line x1="-40" y1="-170" x2="-40" y2="140" stroke="#6C63FF" stroke-width="6" opacity="0.6" stroke-linecap="round"/>
    <line x1="-10" y1="-170" x2="-10" y2="140" stroke="#6C63FF" stroke-width="6" opacity="0.8" stroke-linecap="round"/>
    <line x1="20" y1="-170" x2="20" y2="140" stroke="#6C63FF" stroke-width="6" opacity="0.6" stroke-linecap="round"/>
    <line x1="50" y1="-170" x2="50" y2="140" stroke="#6C63FF" stroke-width="6" opacity="0.7" stroke-linecap="round"/>
    <line x1="80" y1="-170" x2="80" y2="140" stroke="#6C63FF" stroke-width="6" opacity="0.5" stroke-linecap="round"/>
    <line x1="110" y1="-170" x2="110" y2="140" stroke="#6C63FF" stroke-width="6" opacity="0.6" stroke-linecap="round"/>
    
    <!-- Small constellation-like accent dots -->
    <circle cx="-140" cy="-100" r="5" fill="#6C63FF" opacity="0.5"/>
    <circle cx="140" cy="-100" r="5" fill="#6C63FF" opacity="0.5"/>
    <circle cx="0" cy="-220" r="4" fill="#6C63FF" opacity="0.4"/>
  </g>
</svg>